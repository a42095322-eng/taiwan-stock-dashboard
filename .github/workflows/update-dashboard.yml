name: Update dashboard data

on:
  schedule:
    # Taiwan time 08:30, Monday-Friday.
    - cron: '30 0 * * 1-5'
    # Taiwan time 09:00, 11:00, 13:00, 15:00, 17:00, Monday-Friday.
    - cron: '0 1,3,5,7,9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update dashboard JSON
        run: node scripts/update-dashboard.mjs

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "chore: update dashboard data"
            git push
          fi
